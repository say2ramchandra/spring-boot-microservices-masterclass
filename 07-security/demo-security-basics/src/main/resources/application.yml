server:
  port: 8085

spring:
  application:
    name: security-basics-demo

  # H2 Database
  datasource:
    url: jdbc:h2:mem:securitydb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Thymeleaf
  thymeleaf:
    cache: false

# Logging
logging:
  level:
    org.springframework.security: DEBUG
    com.masterclass.security: DEBUG
