<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Security Basics Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .card { background: white; border-radius: 10px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { color: #333; margin-bottom: 1rem; }
        h2 { color: #555; margin-bottom: 1rem; }
        .nav { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .nav a { padding: 0.75rem 1.5rem; background: #667eea; color: white; text-decoration: none; border-radius: 5px; }
        .nav a:hover { background: #5a6fd6; }
        .nav a.danger { background: #dc3545; }
        .profile-info { display: grid; gap: 1rem; }
        .profile-row { display: grid; grid-template-columns: 150px 1fr; padding: 0.75rem; background: #f8f9fa; border-radius: 5px; }
        .profile-row strong { color: #555; }
        .profile-row span { color: #333; }
        .badge { display: inline-block; padding: 0.25rem 0.5rem; background: #28a745; color: white; border-radius: 4px; font-size: 0.85rem; margin: 0.25rem; }
        .badge.admin { background: #dc3545; }
        .badge.manager { background: #fd7e14; }
        .badge.user { background: #17a2b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="nav">
                <a th:href="@{/home}">Home</a>
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/profile}">Profile</a>
                <a th:href="@{/manager}" sec:authorize="hasAnyRole('MANAGER', 'ADMIN')">Manager</a>
                <a th:href="@{/admin}" sec:authorize="hasRole('ADMIN')">Admin</a>
                <a th:href="@{/logout}" class="danger">Logout</a>
            </div>

            <h1>👤 User Profile</h1>
            <p style="color: #666;">View your account information and security details.</p>
        </div>

        <div class="card">
            <h2>Account Information</h2>
            <div class="profile-info">
                <div class="profile-row">
                    <strong>Username:</strong>
                    <span th:text="${user.username}">username</span>
                </div>
                <div class="profile-row">
                    <strong>Account Status:</strong>
                    <span th:text="${user.enabled} ? '✅ Active' : '❌ Disabled'">Active</span>
                </div>
                <div class="profile-row">
                    <strong>Account Locked:</strong>
                    <span th:text="${user.accountNonLocked} ? '🔓 No' : '🔒 Yes'">No</span>
                </div>
                <div class="profile-row">
                    <strong>Credentials:</strong>
                    <span th:text="${user.credentialsNonExpired} ? '✅ Valid' : '⚠️ Expired'">Valid</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Assigned Roles</h2>
            <p style="margin-bottom: 1rem; color: #666;">Your current authorization levels:</p>
            <div>
                <span th:each="auth : ${user.authorities}" 
                      th:text="${auth.authority}"
                      th:class="${'badge ' + (auth.authority.contains('ADMIN') ? 'admin' : (auth.authority.contains('MANAGER') ? 'manager' : 'user'))}">
                </span>
            </div>
        </div>
    </div>
</body>
</html>
