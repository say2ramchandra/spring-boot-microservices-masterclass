server:
  port: 8086

spring:
  application:
    name: demo-jwt-auth
  
  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:jwtdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
jwt:
  secret: YourSuperSecretKeyForJWTSigningMustBeAtLeast256BitsLongForHS256Algorithm
  expiration: 3600000          # 1 hour in milliseconds
  refresh-expiration: 86400000  # 24 hours in milliseconds
  issuer: demo-jwt-auth
  header: Authorization
  prefix: "Bearer "

# Logging
logging:
  level:
    root: INFO
    com.masterclass.security: DEBUG
    org.springframework.security: DEBUG
