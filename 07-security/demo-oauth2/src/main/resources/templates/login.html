<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OAuth2 Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; border-radius: 10px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { color: #333; margin-bottom: 0.5rem; text-align: center; }
        p { color: #666; text-align: center; margin-bottom: 1.5rem; }
        .divider { display: flex; align-items: center; margin: 1.5rem 0; color: #999; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #ddd; }
        .divider span { padding: 0 1rem; }
        .oauth-buttons { display: flex; flex-direction: column; gap: 1rem; }
        .oauth-btn { display: flex; align-items: center; justify-content: center; gap: 0.75rem; padding: 0.875rem 1.5rem; border: 2px solid #e0e0e0; border-radius: 8px; text-decoration: none; color: #333; font-weight: 500; transition: all 0.3s; }
        .oauth-btn:hover { background: #f8f9fa; border-color: #ccc; transform: translateY(-2px); }
        .oauth-btn.google { border-color: #4285f4; color: #4285f4; }
        .oauth-btn.google:hover { background: #e8f0fe; }
        .oauth-btn.github { border-color: #24292e; color: #24292e; }
        .oauth-btn.github:hover { background: #f6f8fa; }
        .icon { font-size: 1.5rem; }
        .alert { padding: 0.75rem; border-radius: 5px; margin-bottom: 1rem; text-align: center; }
        .alert-error { background: #fee; border: 1px solid #f99; color: #c00; }
        .links { text-align: center; margin-top: 1.5rem; }
        .links a { color: #00b4db; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .info-box { background: #fff3cd; border: 1px solid #ffc107; padding: 1rem; border-radius: 5px; margin-top: 1.5rem; font-size: 0.9rem; color: #856404; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Sign In</h1>
        <p>Choose your preferred sign-in method</p>
        
        <!-- Error message -->
        <div th:if="${param.error}" class="alert alert-error">
            Authentication failed. Please try again.
        </div>

        <div class="divider"><span>Sign in with</span></div>

        <div class="oauth-buttons">
            <a href="/oauth2/authorization/google" class="oauth-btn google">
                <span class="icon">🔵</span>
                <span>Continue with Google</span>
            </a>
            
            <a href="/oauth2/authorization/github" class="oauth-btn github">
                <span class="icon">⚫</span>
                <span>Continue with GitHub</span>
            </a>
        </div>

        <div class="links">
            <a th:href="@{/home}">← Back to Home</a>
        </div>

        <div class="info-box">
            <strong>Note:</strong> Configure OAuth2 credentials in <code>application.yml</code> 
            or set environment variables to enable social login.
        </div>
    </div>
</body>
</html>
