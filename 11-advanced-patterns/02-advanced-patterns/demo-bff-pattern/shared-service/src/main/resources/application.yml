spring:
  application:
    name: shared-service
server:
  port: 8100

spring.datasource:
  url: jdbc:h2:mem:productsdb
  driver-class-name: org.h2.Driver
  username: sa
  password:

spring.jpa:
  database-platform: org.hibernate.dialect.H2Dialect
  hibernate.ddl-auto: create-drop
  show-sql: false

logging:
  level:
    com.masterclass.patterns.bff.shared: INFO
