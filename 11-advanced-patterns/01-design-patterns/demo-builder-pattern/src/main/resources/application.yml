spring:
  application:
    name: builder-pattern-demo
    
server:
  port: 8091

# H2 Database
spring.datasource:
  url: jdbc:h2:mem:builderdb
  driver-class-name: org.h2.Driver
  username: sa
  password:

# JPA Configuration
spring.jpa:
  database-platform: org.hibernate.dialect.H2Dialect
  hibernate.ddl-auto: create-drop
  show-sql: true
  properties:
    hibernate:
      format_sql: true

# H2 Console
spring.h2.console:
  enabled: true
  path: /h2-console

# Logging
logging:
  level:
    com.masterclass.patterns.builder: DEBUG
    org.hibernate.SQL: DEBUG
