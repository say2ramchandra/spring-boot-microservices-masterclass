spring:
  application:
    name: service-b
  
  sleuth:
    sampler:
      probability: 1.0  # Sample 100% of requests (for demo)
    
  zipkin:
    base-url: http://localhost:9411
    enabled: true

server:
  port: 8088

logging:
  level:
    root: INFO
    com.masterclass: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
