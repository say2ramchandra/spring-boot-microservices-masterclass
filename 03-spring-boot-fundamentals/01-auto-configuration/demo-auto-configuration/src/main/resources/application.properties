# Application Name
spring.application.name=demo-auto-configuration

# Enable debug mode to see auto-configuration report
debug=false

# Custom service properties
myservice.enabled=true
myservice.endpoint=http://api.example.com
myservice.timeout=5000
myservice.retry-count=3

# Feature flags
feature.email.enabled=true
feature.notification.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.masterclass=DEBUG
