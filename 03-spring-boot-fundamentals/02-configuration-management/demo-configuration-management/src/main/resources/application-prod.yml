# Production profile configuration
server:
  port: 80

app:
  environment: production
  debug-enabled: false
  
  database:
    host: ${DB_HOST:prod-db-server}
    port: ${DB_PORT:3306}
    name: ${DB_NAME:proddb}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    
  api:
    endpoint: ${API_ENDPOINT:https://api.production.com}
    timeout: ${API_TIMEOUT:10000}
    retry-count: ${API_RETRY_COUNT:5}

logging:
  level:
    root: WARN
    com.masterclass: INFO
