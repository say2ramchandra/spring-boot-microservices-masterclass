# Hibernate Performance Demo
spring.application.name=demo-hibernate-performance
server.port=8083

# H2 Database
spring.datasource.url=jdbc:h2:mem:perfdemodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# BATCH PROCESSING Configuration
# ========================================

# JDBC batch size for inserts/updates
spring.jpa.properties.hibernate.jdbc.batch_size=50

# Enable batch versioned data (for optimistic locking)
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Order inserts for better batching
spring.jpa.properties.hibernate.order_inserts=true

# Order updates for better batching
spring.jpa.properties.hibernate.order_updates=true

# ========================================
# FETCH SIZE Configuration
# ========================================

# Default fetch size for large result sets
spring.jpa.properties.hibernate.jdbc.fetch_size=100

# ========================================
# STATISTICS
# ========================================

spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application logging
logging.level.com.masterclass=DEBUG
