# Hibernate Caching Demo
spring.application.name=demo-hibernate-caching
server.port=8082

# H2 Database
spring.datasource.url=jdbc:h2:mem:cachedemodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# SECOND-LEVEL CACHE (L2) Configuration
# ========================================

# Enable L2 cache
spring.jpa.properties.hibernate.cache.use_second_level_cache=true

# Cache region factory
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory

# JCache provider (Ehcache)
spring.jpa.properties.hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider

# Ehcache config file
spring.jpa.properties.hibernate.javax.cache.uri=classpath:ehcache.xml

# ========================================
# QUERY CACHE Configuration
# ========================================

# Enable query cache
spring.jpa.properties.hibernate.cache.use_query_cache=true

# ========================================
# STATISTICS (for monitoring)
# ========================================

# Enable statistics
spring.jpa.properties.hibernate.generate_statistics=true

# Log statistics
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application logging
logging.level.com.masterclass=DEBUG

# SQL initialization
spring.sql.init.mode=always
