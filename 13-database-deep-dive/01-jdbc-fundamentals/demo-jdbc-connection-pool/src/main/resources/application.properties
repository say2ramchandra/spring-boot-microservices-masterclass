# Connection Pool Demo Configuration
spring.application.name=demo-connection-pool
server.port=8081

# ==========================================
# H2 Database (for demo purposes)
# ==========================================
spring.datasource.url=jdbc:h2:mem:pooldemodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# HikariCP Configuration (DETAILED)
# ==========================================
# HikariCP is the default connection pool in Spring Boot

# Pool Identity
spring.datasource.hikari.pool-name=MasterclassPool

# Pool Sizing
# -------------
# Maximum number of connections in the pool
# Formula: connections = (core_count * 2) + effective_spindle_count
# For SSDs: connections = core_count * 2
# Start small! Most apps need only 10-20 connections
spring.datasource.hikari.maximum-pool-size=10

# Minimum idle connections maintained when pool is idle
# Set equal to maximum-pool-size for best performance (if connections are cheap)
spring.datasource.hikari.minimum-idle=5

# Timeouts
# --------
# Maximum time to wait for a connection from the pool (ms)
# Too short = ConnectionTimeout exceptions
# Too long = Application appears hung
spring.datasource.hikari.connection-timeout=30000

# Maximum time a connection can sit idle in the pool (ms)
# Only applies when minimum-idle < maximum-pool-size
spring.datasource.hikari.idle-timeout=600000

# Maximum lifetime of a connection in the pool (ms)
# Should be several seconds shorter than database timeout
# Prevents using stale connections
spring.datasource.hikari.max-lifetime=1800000

# Connection Validation
# ---------------------
# Query to test connection validity (optional - HikariCP uses JDBC4 isValid() by default)
# spring.datasource.hikari.connection-test-query=SELECT 1

# How often to check connection validity (ms)
spring.datasource.hikari.keepalive-time=300000

# Validation timeout for connections (ms)
spring.datasource.hikari.validation-timeout=5000

# Leak Detection
# --------------
# Time after which a connection is considered "leaked" (ms)
# Set to 0 to disable. Use during development to find connection leaks!
spring.datasource.hikari.leak-detection-threshold=60000

# Connection Initialization
# -------------------------
# SQL to run when a new connection is created
spring.datasource.hikari.connection-init-sql=SELECT 1

# Auto-commit default value
spring.datasource.hikari.auto-commit=true

# Read-only mode (optimization hint)
# spring.datasource.hikari.read-only=false

# Transaction Isolation
# spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# ==========================================
# MySQL/PostgreSQL Performance Settings
# (Uncomment for production databases)
# ==========================================
# spring.datasource.hikari.data-source-properties.cachePrepStmts=true
# spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
# spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
# spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
# spring.datasource.hikari.data-source-properties.useLocalSessionState=true
# spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true
# spring.datasource.hikari.data-source-properties.cacheResultSetMetadata=true
# spring.datasource.hikari.data-source-properties.cacheServerConfiguration=true

# ==========================================
# Actuator Endpoints (for monitoring)
# ==========================================
management.endpoints.web.exposure.include=health,metrics,hikaricp
management.endpoint.health.show-details=always
management.health.db.enabled=true

# ==========================================
# Logging
# ==========================================
logging.level.com.masterclass=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.com.zaxxer.hikari.pool.HikariPool=DEBUG

# Initialize schema
spring.sql.init.mode=always
