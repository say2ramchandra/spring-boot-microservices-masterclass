# JDBC Basics Demo Configuration
spring.application.name=demo-jdbc-basics

# H2 Database (In-Memory)
spring.datasource.url=jdbc:h2:mem:jdbcdemodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Connection Pool (HikariCP - default in Spring Boot)
spring.datasource.hikari.pool-name=JDBCDemoPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# Initialize database with schema.sql and data.sql
spring.sql.init.mode=always

# Logging
logging.level.com.masterclass=DEBUG
logging.level.com.zaxxer.hikari=INFO
logging.level.org.springframework.jdbc=DEBUG
